<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma - Portal Interno</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background overlay elements for modern glassmorphism effect -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Removed Global Logo per request -->

    <main class="app-container">
        
        <!-- Login View -->
        <section id="login-view" class="view active">
            <div class="glass-card login-card">
                <div class="brand">
                    <h1 class="brand-title">Sigma</h1>
                    <p class="brand-subtitle">Portal de Acceso</p>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    </div>
                    
                    <div id="error-message" class="error-message">Credenciales incorrectas</div>
                    
                    <button type="submit" class="primary-btn">Iniciar Sesión</button>
                </form>
            </div>
        </section>

        <!-- Home View -->
        <section id="home-view" class="view hidden">
            <header class="app-header glass-card">
                <div class="logo-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Sigma_Alimentos_logotipo.png/320px-Sigma_Alimentos_logotipo.png" alt="Sigma Logo" class="brand-logo" id="header-logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'120\' height=\'40\'><rect width=\'120\' height=\'40\' fill=\'%23d32f2f\' rx=\'4\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'white\' font-family=\'sans-serif\' font-weight=\'bold\' font-size=\'20\'>Sigma</text></svg>'">
                </div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span class="greeting">Hola, Admin</span>
                    <button id="logout-btn" class="text-btn">Salir</button>
                </div>
            </header>
            
            <div class="dashboard-content">
                <div class="glass-card widget-container">
                    <script async src="https://cdn.simplyask.ai/widget/widget.js"></script>
                    <div 
                        class="simplyask-agent-widget inline-widget" 
                        data-iva-agent-id="27eb0633-1318-4439-903a-7e91145bec4d"
                        data-widget-id="83855e32-8cc8-4157-8906-c08c771d51eb"
                        data-open="true"
                        data-default-open="true"
                        data-mode="inline"
                        data-display="inline"
                        data-embed="true">
                    </div>
                </div>
            </div>
        </section>

    </main>
    
    <script src="script.js"></script>
</body>
</html>
